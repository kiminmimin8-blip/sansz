# This is a basic workflow to help you get started with Actions

me: Build Plugin

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract project zip (kalau ada)
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Nemu zip: $ZIP_FILE"
            mkdir -p extracted
            unzip -o "$ZIP_FILE" -d extracted
            PROJECT_DIR=$(find extracted -maxdepth 3 -name "pom.xml" -exec dirname {} \; | head -n 1)
            if [ -n "$PROJECT_DIR" ]; then
              echo "Copy isi $PROJECT_DIR ke root repo"
              cp -rf "$PROJECT_DIR"/. .
            else
              echo "Gak nemu pom.xml di dalam zip!"
              exit 1
            fi
          else
            echo "Gak ada zip di root repo, lanjut pakai source yang udah ada."
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanz-market-jar
          path: target/*.jar
